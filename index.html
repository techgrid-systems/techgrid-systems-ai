<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGrid Systems Expert Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-bubble {
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
            line-height: 1.5;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-dots span {
            animation: blink 1.4s infinite both;
            height: 6px;
            width: 6px;
            background-color: #9ca3af;
            display: inline-block;
            border-radius: 50%;
            margin: 0 2px;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        .link-card {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            color: #34d399;
            text-decoration: none;
            transition: all 0.2s;
        }
        .link-card:hover {
            background: rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }
        #chat-window::-webkit-scrollbar {
            width: 6px;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-950 h-screen flex items-center justify-center p-4 font-sans text-slate-200">

    <div class="w-full max-w-md h-[600px] bg-slate-900 rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-800">
        <!-- Header -->
        <div class="bg-emerald-600 p-4 flex items-center gap-3 border-b border-emerald-500">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-lg">
                <span class="text-emerald-600 font-bold text-xl">T</span>
            </div>
            <div>
                <h1 class="text-white font-bold text-lg">TechGrid Expert</h1>
                <p class="text-emerald-100 text-xs">Manual Knowledge Base Mode</p>
            </div>
        </div>

        <!-- Chat Window -->
        <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-4">
            <div class="flex justify-start">
                <div class="message-bubble bg-slate-800 text-slate-300 p-3 rounded-2xl rounded-tl-none border border-slate-700 shadow-md">
                    Hello! I'm the manual TechGrid assistant. I can provide direct links and information about our infrastructure, status, and sub-pages.
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-slate-900 border-t border-slate-800">
            <div class="flex gap-2">
                <input type="text" id="user-input" 
                    placeholder="Search TechGrid sites..." 
                    class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                <button id="send-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white p-2 rounded-xl transition-colors shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Manual Knowledge Base with explicit URLs for sub-pages
        const TECHGRID_DATA = [
            {
                keywords: ["what is", "do", "about"],
                response: "TechGrid Systems provides high-performance infrastructure solutions and systematic technical documentation. We specialize in scalable systems architecture and automated deployment workflows.",
                url: "https://www.techgrid-systems.org.uk/about",
                linkText: "Learn about TechGrid"
            },
            {
                keywords: ["status", "up", "down", "working"],
                response: "You can monitor the real-time status of all TechGrid infrastructure components on our dedicated status dashboard.",
                url: "https://status.techgrid-systems.org.uk",
                linkText: "View Live Status Page"
            },
            {
                keywords: ["docs", "documentation", "guide", "manual"],
                response: "Our technical documentation is hosted on our main portal, covering everything from system setup to API references.",
                url: "https://www.techgrid-systems.org.uk/docs",
                linkText: "Browse Documentation"
            },
            {
                keywords: ["github", "source", "code", "repo"],
                response: "We maintain an open-first approach. You can find our public repositories and system configurations on GitHub.",
                url: "https://github.com/techgrid-systems",
                linkText: "Visit GitHub Organization"
            },
            {
                keywords: ["contact", "support", "help", "email"],
                response: "Need direct assistance? You can reach our support team through our contact portal.",
                url: "https://www.techgrid-systems.org.uk/contact",
                linkText: "Contact Support"
            },
            {
                keywords: ["infrastructure", "architecture", "stack"],
                response: "TechGrid's infrastructure is built on modular, scalable principles using modern CI/CD pipelines.",
                url: "https://www.techgrid-systems.org.uk/infrastructure",
                linkText: "Architecture Overview"
            }
        ];

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(role, text, link = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `message-bubble p-3 rounded-2xl border shadow-md ${
                role === 'user' 
                ? 'bg-emerald-600 text-white rounded-tr-none border-emerald-500' 
                : 'bg-slate-800 text-slate-300 rounded-tl-none border-slate-700'
            }`;
            
            bubble.innerText = text;

            if (link) {
                const linkCard = document.createElement('a');
                linkCard.href = link.url;
                linkCard.target = "_blank";
                linkCard.className = "link-card";
                linkCard.innerHTML = `
                    <div class="text-[10px] uppercase tracking-wider opacity-60">Official Link</div>
                    <div class="font-bold text-sm">${link.text}</div>
                    <div class="text-[10px] truncate opacity-50">${link.url}</div>
                `;
                bubble.appendChild(linkCard);
            }
            
            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = "flex justify-start typing-indicator";
            wrapper.innerHTML = `
                <div class="message-bubble bg-slate-800 p-3 rounded-2xl rounded-tl-none border border-slate-700">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>`;
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return wrapper;
        }

        function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            
            const indicator = showTypingIndicator();

            setTimeout(() => {
                indicator.remove();
                const lowerText = text.toLowerCase();
                
                // Find matching entry based on keywords
                const match = TECHGRID_DATA.find(entry => 
                    entry.keywords.some(key => lowerText.includes(key))
                );

                if (match) {
                    appendMessage('bot', match.response, { url: match.url, text: match.linkText });
                } else {
                    appendMessage('bot', "I'm not sure about that specific detail. You can browse our full sitemap here:", { 
                        url: "https://www.techgrid-systems.org.uk/sitemap", 
                        text: "TechGrid Sitemap" 
                    });
                }
            }, 600);
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
        window.onload = () => userInput.focus();
    </script>
</body>
</html>
