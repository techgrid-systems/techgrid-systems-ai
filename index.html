<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techgrid Systems Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-bubble {
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
            line-height: 1.5;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-dots span {
            animation: blink 1.4s infinite both;
            height: 6px;
            width: 6px;
            background-color: #94a3b8;
            display: inline-block;
            border-radius: 50%;
            margin: 0 2px;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        .link-card {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: rgba(37, 99, 235, 0.05);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 12px;
            color: #2563eb;
            text-decoration: none;
            transition: all 0.2s;
        }
        .link-card:hover {
            background: rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }
        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .btn-yes { background: #2563eb; color: white; }
        .btn-yes:not(:disabled):hover { background: #1d4ed8; }
        .btn-no { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
        .btn-no:not(:disabled):hover { background: #e2e8f0; }
        
        .btn-selected { outline: 2px solid #2563eb; opacity: 1 !important; transform: scale(0.98); }
        
        .btn-end { background: #dc2626; color: white; width: 100%; margin-top: 8px; }
        .btn-end:hover { background: #b91c1c; }

        #chat-window::-webkit-scrollbar {
            width: 6px;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 1rem;
            top: 3.5rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 50;
            width: 180px;
        }
        .dropdown-menu.show { display: block; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="w-full max-w-md h-[600px] bg-white rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 relative">
        <!-- Header -->
        <div class="bg-blue-600 p-4 flex items-center justify-between border-b border-blue-700 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-inner overflow-hidden">
                    <img src="https://techgrid-systems.github.io/techgrid-systems-logo/tgs.jpg" alt="Logo" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-blue-600 font-bold\'>T</span>'">
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg leading-tight">Techgrid Systems Bot</h1>
                    <p class="text-blue-100 text-xs">Techgrid Systems AI System</p>
                </div>
            </div>
            <button id="menu-btn" class="text-white hover:bg-blue-500 p-2 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                </svg>
            </button>
        </div>

        <div id="dropdown" class="dropdown-menu">
            <button id="export-btn" class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download Chat (.txt)
            </button>
        </div>

        <!-- Chat Window -->
        <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-4 bg-white">
            <div class="flex justify-start">
                <div class="message-bubble bg-slate-100 text-slate-700 p-3 rounded-2xl rounded-tl-none border border-slate-200 shadow-sm">
                   Hello! I am Nexsis your friendly AI, its nice to chat with you. I am here to help you find your way and get you the information you may need. 
                   <br> 
                   <br>
                   How may I assist you today? 
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div id="input-container" class="p-4 bg-slate-50 border-t border-slate-200">
            <div class="flex gap-2">
                <input type="text" id="user-input" 
                    placeholder="Please type your message here...." 
                    class="flex-1 bg-white border border-slate-300 rounded-xl px-4 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm">
                <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-xl transition-colors shadow-lg active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = [
            { role: "Bot", text: "Hello! I am Nexsis your friendly AI, its nice to chat with you. I am here to help you find your way and get you the information you may need. How may I assist you today?" }
        ];

        const TECHGRID_DATA = [
            {
                keywords: ["what is", "do", "about"],
                response: "Techgrid Systems provides high-performance infrastructure solutions and systematic technical documentation. We specialize in scalable systems architecture.",
                url: "https://www.techgrid-systems.org.uk/about",
                linkText: "Learn about Techgrid"
            },
            {
                keywords: ["status", "up", "down", "working"],
                response: "You can monitor the real-time status of all Techgrid infrastructure components on our status dashboard.",
                url: "https://status.techgrid-systems.org.uk",
                linkText: "View Live Status Page"
            },
            {
                keywords: ["docs", "documentation", "guide", "manual"],
                response: "Our technical documentation covers system setup and API references.",
                url: "https://www.techgrid-systems.org.uk/docs",
                linkText: "Browse Documentation"
            }
        ];

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const inputContainer = document.getElementById('input-container');
        const menuBtn = document.getElementById('menu-btn');
        const dropdown = document.getElementById('dropdown');
        const exportBtn = document.getElementById('export-btn');

        menuBtn.addEventListener('click', () => dropdown.classList.toggle('show'));
        window.addEventListener('click', (e) => {
            if (!menuBtn.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show');
        });

        exportBtn.addEventListener('click', () => {
            let content = "TECHGRID SYSTEMS CHAT LOG\n";
            content += "--------------------------\n\n";
            chatHistory.forEach(msg => {
                content += `${msg.role}: ${msg.text}\n`;
                if (msg.link) {
                    content += `Link: ${msg.link.text} (${msg.link.url})\n`;
                }
                content += `\n`;
            });

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tgs-chat-export.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            dropdown.classList.remove('show');
        });

        function appendMessage(role, text, link = null) {
            chatHistory.push({ role: role === 'user' ? 'User' : 'Bot', text: text, link: link });
            
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `message-bubble p-3 rounded-2xl border shadow-sm ${
                role === 'user' 
                ? 'bg-blue-600 text-white rounded-tr-none border-blue-500' 
                : 'bg-slate-100 text-slate-700 rounded-tl-none border-slate-200'
            }`;
            
            bubble.innerText = text;

            if (link) {
                const linkCard = document.createElement('a');
                linkCard.href = link.url;
                linkCard.target = "_blank";
                linkCard.className = "link-card";
                linkCard.innerHTML = `
                    <div class="font-bold text-sm">${link.text}</div>
                    <div class="text-[10px] truncate opacity-60">${link.url}</div>
                `;
                bubble.appendChild(linkCard);
            }
            
            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = "flex justify-start typing-indicator";
            wrapper.innerHTML = `
                <div class="message-bubble bg-slate-100 p-3 rounded-2xl rounded-tl-none border border-slate-200">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>`;
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return wrapper;
        }

        function toggleInput(show) {
            inputContainer.style.display = show ? 'block' : 'none';
        }

        function askIfFinished() {
            setTimeout(() => {
                const wrapper = document.createElement('div');
                wrapper.className = "flex justify-start question-container";
                const bubble = document.createElement('div');
                bubble.className = "message-bubble bg-slate-100 text-slate-700 p-4 rounded-2xl rounded-tl-none border border-slate-200 shadow-md w-full";
                
                const question = "Are you finished with this inquiry?";
                chatHistory.push({ role: "Bot", text: question });

                bubble.innerHTML = `
                    <p class="mb-3 font-medium">${question}</p>
                    <div class="flex gap-2 btn-group">
                        <button onclick="handleFinished(true, this)" class="action-btn btn-yes flex-1">Yes</button>
                        <button onclick="handleFinished(false, this)" class="action-btn btn-no flex-1 shadow-sm">No</button>
                    </div>
                    <div class="selection-status mt-2 text-xs font-bold text-blue-600 hidden"></div>
                `;
                
                wrapper.appendChild(bubble);
                chatWindow.appendChild(wrapper);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                toggleInput(false);
            }, 1000);
        }

        function handleFinished(isFinished, btn) {
            const val = isFinished ? "Yes" : "No";
            chatHistory.push({ role: "User Selection", text: val });
            
            const bubble = btn.closest('.message-bubble');
            const group = btn.closest('.btn-group');
            const status = bubble.querySelector('.selection-status');
            
            Array.from(group.children).forEach(b => {
                b.disabled = true;
                b.style.opacity = "0.5";
            });
            btn.classList.add('btn-selected');
            
            // Show selection text in UI
            status.innerText = "Answer = " + val;
            status.classList.remove('hidden');

            setTimeout(() => {
                if (isFinished) {
                    const wrapper = document.createElement('div');
                    wrapper.className = "flex justify-start";
                    const bubbleEnd = document.createElement('div');
                    bubbleEnd.className = "message-bubble bg-slate-100 text-slate-700 p-4 rounded-2xl rounded-tl-none border border-slate-200 shadow-md w-full";
                    
                    const msg = "Thank you for contacting Techgrid Systems.";
                    chatHistory.push({ role: "Bot", text: msg });

                    bubbleEnd.innerHTML = `
                        <p>${msg}</p>
                        <button onclick="location.reload()" class="action-btn btn-end shadow-lg">End Conversation</button>
                    `;
                    
                    wrapper.appendChild(bubbleEnd);
                    chatWindow.appendChild(wrapper);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                } else {
                    const wrapper = document.createElement('div');
                    wrapper.className = "flex justify-start question-container";
                    const bubbleAnother = document.createElement('div');
                    bubbleAnother.className = "message-bubble bg-slate-100 text-slate-700 p-4 rounded-2xl rounded-tl-none border border-slate-200 shadow-md w-full";
                    
                    const question = "Do you have another question you would like to ask?";
                    chatHistory.push({ role: "Bot", text: question });

                    bubbleAnother.innerHTML = `
                        <p class="mb-3 font-medium">${question}</p>
                        <div class="flex gap-2 btn-group">
                            <button onclick="handleAnother(true, this)" class="action-btn btn-yes flex-1">Yes</button>
                            <button onclick="handleAnother(false, this)" class="action-btn btn-no flex-1 shadow-sm">No</button>
                        </div>
                        <div class="selection-status mt-2 text-xs font-bold text-blue-600 hidden"></div>
                    `;
                    
                    wrapper.appendChild(bubbleAnother);
                    chatWindow.appendChild(wrapper);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            }, 600);
        }

        function handleAnother(wantMore, btn) {
            const val = wantMore ? "Yes" : "No";
            chatHistory.push({ role: "User Selection", text: val });

            const bubble = btn.closest('.message-bubble');
            const group = btn.closest('.btn-group');
            const status = bubble.querySelector('.selection-status');
            
            Array.from(group.children).forEach(b => {
                b.disabled = true;
                b.style.opacity = "0.5";
            });
            btn.classList.add('btn-selected');

            status.innerText = "Answer = " + val;
            status.classList.remove('hidden');

            setTimeout(() => {
                if (wantMore) {
                    appendMessage('bot', "Please let me know what other questions you want answering and I will try my best to help you.");
                    toggleInput(true);
                    userInput.focus();
                } else {
                    appendMessage('bot', "Refreshing conversation...");
                    setTimeout(() => location.reload(), 1500);
                }
            }, 600);
        }

        function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            
            const indicator = showTypingIndicator();

            setTimeout(() => {
                indicator.remove();
                const lowerText = text.toLowerCase();
                const match = TECHGRID_DATA.find(entry => 
                    entry.keywords.some(key => lowerText.includes(key))
                );

                if (match) {
                    appendMessage('bot', match.response, { url: match.url, text: match.linkText });
                } else {
                    appendMessage('bot', "I am not sure about that. You can view our sitemap here:", { 
                        url: "https://www.techgrid-systems.org.uk/sitemap", 
                        text: "Techgrid Systems Sitemap" 
                    });
                }
                
                askIfFinished();
            }, 800);
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
        window.onload = () => userInput.focus();
    </script>
</body>
</html>
